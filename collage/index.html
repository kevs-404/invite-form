  body {
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
    margin: 0;
    padding: 20px;
  }

  h1 {
    text-align: center;
    color: #333;
    margin-bottom: 30px;
  }

  .month-section {
    margin-top: 50px;
    margin-bottom: 50px;
  }

  .month-title {
    font-size: 1.5em;
    margin-bottom: 15px;
    color: #444;
    border-bottom: 2px solid #ccc;
    padding-bottom: 5px;
  }

  .month-description {
    max-width: 1200px;
    margin: 0 auto 20px auto; /* center + spacing below */
    color: #555;
    line-height: 1.6;
    font-size: 1em;
  }

  .collage {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    max-width: 1200px;
    margin: 0 auto;
    gap: 15px;
  }

  .photo-container {
    position: relative;
    overflow: hidden;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .photo-container img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
  }

  .photo-container:hover {
    transform: scale(1.05) rotate(2deg);
    box-shadow: 0 8px 16px rgba(0,0,0,0.3);
    z-index: 10;
  }

 .guestbook {
    max-width: 1200px;
    margin: 25px auto 0;
    padding-top: 15px;
    border-top: 2px solid #eee;

  .guestbook textarea.message {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;

    min-height: 120px;
    max-height: 300px;
    resize: vertical;

    box-sizing: border-box;
    margin-bottom: 10px;

  .guestbook button {

    background: #333;
    color: white;
    border-radius: 8px;

  // add comments and feedback
  window.addComment = async function(month, btn) {
    const parent = btn.closest(".month-section");
    const message = parent.querySelector(".message").value;

    if (!message) {
      swal("Oops!", `Please write your feedback for ${month} section`, "warning");
      return;
    }

    try {
      await addDoc(collection(db, "comments"), {
        message,
        month: month,
        createdAt: new Date()
      });

      parent.querySelector(".message").value = "";

      loadComments(month, parent.querySelector(".guestbook"));

      swal("Success!", `Your comment for ${month} has been added 💬`, "success");

    } catch (error) {
      console.error(error);

      swal("Error!", "Something went wrong while saving your comment.", "error");
    }
  }

  // view comments and feedback
  async function loadComments(month, container) {
    const q = query(
      collection(db, "comments"),
      where("month", "==", month),
      orderBy("createdAt", "desc")
    );

    const snapshot = await getDocs(q);

    const list = container.querySelector(".commentsList");
    list.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const date = data.createdAt?.toDate 
        ? data.createdAt.toDate()
        : new Date(data.createdAt);

      const formattedDate = formatDate(date);

      list.innerHTML += `
        <div class="comment">
          <div class="comment-header">
            <strong>${"User: "}</strong>
            <span class="comment-time">${formattedDate}</span>
          </div>
          <p class="comment-text">${data.message}</p>
        </div>
      `;
    });
  }

  function formatDate(date) {
    return date.toLocaleString("en-US", {
      year: "numeric",
      month: "long",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
      hour12: true
    });
  }

  //   const maxY = modal.clientHeight - 50;

  //   const x = Math.random() * maxX;
  //   const y = Math.random() * maxY;

  //   noLabel.style.position = "absolute";
  //   noLabel.style.left = x + "px";
  //   noLabel.style.top = y + "px";
  // }

  window.survey = function survey() {
    const selected = document.querySelector('input[name="friend"]:checked'); // radio button
    const remarks = document.getElementById("remarks").value.trim(); // remarks

    // if (!selected) {
    //   swal("Oops!", "Please select an option at least.", "warning");
    //   return;
    // }

    if (remarks.length > 100) {
      swal("Oops!", "Remarks must be 100 characters only.", "warning");
      return;
    }

    // const labelText = selected.parentElement.innerText.trim();
    const labelText = selected ? selected.parentElement.innerText.trim() : "No response";

    const params = {
      title: 'Survey Form',
      choice: labelText, 
      remarks: remarks ? remarks : "No remarks",
      page: window.location.href,
      time: new Date().toLocaleString()
    };

    // // email js: serviceID, templateID, templateParams
    emailjs.send("service_sd8nt2d", "template_cif7d4a", params)
    .then(() => {
      swal("Success!", "Your response has been successfully sent.", "success");
      // clear radio button
      document.querySelectorAll('input[name="friend"]').forEach(radio => {
        radio.checked = false;
      });
      // clear remarks
      document.querySelector('#remarks').value = "";
      // close modal
      document.getElementById("myModal").style.display = "none";
    })
    .catch((err) => {
      console.log(err);
      swal("Error!", "Failed to send response. Try again.", "error");
    });
  }

  const goTopBtn = document.getElementById("goTopBtn");
  const goDownBtn = document.getElementById("goDownBtn");

  window.addEventListener("scroll", () => {
    if (window.scrollY > 300) {
      goTopBtn.style.display = "block";
      goDownBtn.style.display = "block";
    } else {
      goTopBtn.style.display = "none";
      goDownBtn.style.display = "none";
    }
  });

  window.goToTop = function () {
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  window.goToBottom = function () {
    window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
  };

  window.goTo = function(id) {
    const el = document.getElementById(id);

    if (el) {
      el.scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }
  };

  const images = Array.from(document.querySelectorAll(".photo-container img"));
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");
  const lightboxTitle = document.getElementById("lightbox-title");

  let currentIndex = 0;

  images.forEach((img, index) => {
    img.addEventListener("click", () => {
      openLightbox(index);
    });
  });

  function openLightbox(index) {
    currentIndex = index;
    lightbox.style.display = "flex";
    updateLightbox();
  }

  function updateLightbox() {
    const img = images[currentIndex];

    // show image
    lightboxImg.src = img.src;

    // find month title (closest section)
    const monthSection = img.closest(".month-section");
    const month = monthSection.dataset.month || monthSection.id;

    // title
    const titleText = monthSection.querySelector(".month-title").innerText;
    lightboxTitle.innerHTML = monthSection.querySelector(".month-title").innerHTML;
    // lightboxTitle.innerText = titleText;

    // comments
    const commentContainer = document.getElementById("lightbox-comments");

    if (commentContainer) {
      loadComments(month, commentContainer);
    }
  }

  window.nextImage = function () {
    currentIndex++;
    if (currentIndex >= images.length) {
      currentIndex = 0;
    }
    updateLightbox();
  };

  window.prevImage = function () {
    currentIndex--;
    if (currentIndex < 0) {
      currentIndex = images.length - 1;
    }
    updateLightbox();
  };

  window.closeLightbox = function () {
    lightbox.style.display = "none";
    lightboxImg.src = "";
    lightboxTitle.innerText = "";
  };

  lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) {
      closeLightbox();
    }
  });

  // highlighter in nav
  const sections = document.querySelectorAll(".month-section");
  const navLinks = document.querySelectorAll(".side-nav a");

  function setActive(monthId) {
    navLinks.forEach(link => {
      link.classList.remove("active");

      if (link.getAttribute("onclick")?.includes(monthId)) {
        link.classList.add("active");
      }
    });
  }

  window.addEventListener("scroll", () => {
    let current = "";

    sections.forEach(section => {
      const rect = section.getBoundingClientRect();

      if (rect.top <= window.innerHeight / 2 && rect.bottom >= window.innerHeight / 2) {
        current = section.id;
      }
    });

    if (current) {
      setActive(current);
    }
  });

  // music request
  window.playMusic = async function () {
    const url = document.getElementById("musicLink").value;
    const player = document.getElementById("musicPlayer");
    const spotifyDefault = document.getElementById("spotify-player");

    if (!url) {
      swal("Oops!", `Please paste a link`, "warning");
      return;
    }

    let isValid = false;
    let type = "";

    // YOUTUBE
    if (url.includes("youtube.com") || url.includes("youtu.be")) {
      isValid = true;
      type = "youtube";

      let videoId = "";

      if (url.includes("youtu.be/")) {
        videoId = url.split("youtu.be/")[1].split("?")[0];
      } else {
        videoId = new URL(url).searchParams.get("v");
      }

      player.innerHTML = `
        <iframe width="100%" height="315"
          src="https://www.youtube.com/embed/${videoId}?autoplay=1"
          frameborder="0"
          allow="autoplay; encrypted-media"
          allowfullscreen>
        </iframe>
      `;
    }

    // SPOTIFY
    else if (url.includes("spotify.com")) {
      isValid = true;
      type = "spotify";

      let embedUrl = "";

      if (url.includes("/track/")) {
        const id = url.split("/track/")[1].split("?")[0];
        embedUrl = `https://open.spotify.com/embed/track/${id}`;
      } 
      else if (url.includes("/playlist/")) {
        const id = url.split("/playlist/")[1].split("?")[0];
        embedUrl = `https://open.spotify.com/embed/playlist/${id}`;
      }
      else if (url.includes("/album/")) {
        const id = url.split("/album/")[1].split("?")[0];
        embedUrl = `https://open.spotify.com/embed/album/${id}`;
      }

      player.innerHTML = `
        <iframe style="border-radius:12px"
          src="${embedUrl}"
          width="100%" height="152"
          frameborder="0"
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
        </iframe>
      `;
    }

    // invalid link
    else {
      swal("Oops!", `Invalid link. Use YouTube or Spotify only.`, "warning");
      return;
    }

    // success hide spotify default player
    if (isValid && spotifyDefault) {
      spotifyDefault.style.display = "none";
    }

    // SAVE TO FIREBASE
    try {
      await addDoc(collection(db, "music_links"), {
        url: url,
        type: type,
        createdAt: new Date(),
        ip: ipData.ip || "N/A",
        city: ipData.city || "N/A",
        region: ipData.region || "N/A",
        country: ipData.country_name || "N/A"
      });
      swal("OK!", `Success`, "success");
    } catch (error) {
      swal("Oops!", `Error`, "warning");
      console.error("Error saving music:", error);
    }
  };

  let isChatOpen = false;
  let unreadCount = 0;
  let isInitialLoad = true;
  let lastReadTime = null;
  let forceRecheck = false;

  const chatBox = document.getElementById("chat-box");
  const badge = document.getElementById("notif-badge");
  const messagesDiv = document.getElementById("messages");

  // chatbox
  document.getElementById("chat-toggle").onclick = async () => {
    isChatOpen = !isChatOpen;

    chatBox.style.display = isChatOpen ? "flex" : "none";

    // reset notif when read message
    if (isChatOpen) {
      unreadCount = 0;
      badge.innerText = "0";
      badge.style.display = "none";

      // save last seen record
      await setDoc(doc(db, "chatMeta", "user1"), {
        lastRead: serverTimestamp(),
        ip: ipData.ip || "N/A",
        city: ipData.city || "N/A",
        region: ipData.region || "N/A",
        country: ipData.country_name || "N/A"
      });

      // auto focus recent chat
      setTimeout(() => {
        const messagesDiv = document.getElementById("messages");
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }, 100);
    }
  };

  // window.addEventListener("load", () => {
  //   document.getElementById("chat-toggle").click();
  // });

  document.getElementById("send").onclick = async () => {
    const msg = document.getElementById("msg").value;

    if (!msg) return;

    await addDoc(collection(db, "chat"), {
      text: msg,
      sender: "user",
      name: "Shaine",
      avatar: "👤",
      createdAt: new Date()
    });

    document.getElementById("msg").value = "";
  };

  // send message upon enter
  document.getElementById("msg").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      e.preventDefault(); 
      document.getElementById("send").click();
    }
  });

  const q = query(collection(db, "chat"), orderBy("createdAt", "asc"));

  onSnapshot(q, (snapshot) => {
    let html = "";
    unreadCount = 0;

    snapshot.forEach((doc) => {
      const data = doc.data();

      const msgTime = data.createdAt?.toDate?.();

      // unread messages
      if (data.sender === "admin") {
        if (!lastReadTime || msgTime > lastReadTime) {
          unreadCount++;
        }
      }

      // load chats
      html += `
        <div style="
          display:flex;
          justify-content:${data.sender === 'user' ? 'flex-end' : 'flex-start'};
          margin:8px 0;
        ">

          ${data.sender === 'admin' ? `
            <div style="
              width:28px;
              height:28px;
              border-radius:50%;
              background:#333;
              color:#fff;
              display:flex;
              align-items:center;
              justify-content:center;
              font-size:12px;
              margin-right:6px;
            ">A</div>
          ` : ""}

          <div style="
            background:${data.sender === 'user' ? '#4caf50' : '#eee'};
            color:${data.sender === 'user' ? 'white' : 'black'};
            padding:8px 12px;
            border-radius:12px;
            max-width:70%;
            display:flex;
            flex-direction:column;
          ">
            <div>
              ${linkify(data.text)}
            </div>

            <div style="
              font-size:10px;
              opacity:0.6;
              margin-top:4px;
              text-align:right;
            ">
              ${formatChatDate(data.createdAt)}
            </div>
          </div>

          ${data.sender === 'user' ? `
            <div style="
              width:28px;
              height:28px;
              border-radius:50%;
              background:#999;
              color:#fff;
              display:flex;
              align-items:center;
              justify-content:center;
              font-size:12px;
              margin-left:6px;
            ">S</div>
          ` : ""}
        </div>
      `;
    });

    messagesDiv.innerHTML = html;
    messagesDiv.scrollTop = messagesDiv.scrollHeight;

    if (forceRecheck) {
      unreadCount = 0;
      forceRecheck = false;
    }

    // reset notif if already seen
    if (!isChatOpen && unreadCount > 0) {
      badge.innerText = unreadCount;
      badge.style.display = "block";
    } else {
      badge.innerText = "0";
      badge.style.display = "none";
    }
  });

  function scrollToBottom() {
    const messagesDiv = document.getElementById("messages");

    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  onSnapshot(doc(db, "chatMeta", "user1"), (snap) => {
    if (snap.exists()) {
      lastReadTime = snap.data().lastRead?.toDate?.() || null;
      forceRecheck = true;
    }
  });

  function formatChatDate(timestamp) {
    const date = timestamp?.toDate?.();
    if (!date) return "";

    return date.toLocaleString("en-US", {
      month: "short",
      day: "2-digit",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit",
      hour12: true
    });
  }

  // hyperlink in chats
  function linkify(text) {
    const urlPattern = /((https?:\/\/|www\.)[^\s]+)/g;
    return text.replace(urlPattern, function(url) {
      let href = url;
      if (!href.startsWith("http")) {
        href = "http://" + href;
      }
      return `<a href="${href}" target="_blank" class="chat-link">${url}</a>`;
    });
  }

  document.addEventListener("click", async (e) => {
    if (e.target.classList.contains("chat-link")) {
      
      const url = e.target.href;

      try {
        await setDoc(doc(db, "linkClicks", Date.now().toString()), {
          url: url,
          clickedAt: serverTimestamp(),
          user: "Shaine",
          ip: ipData.ip || "N/A",
          city: ipData.city || "N/A",
            region: ipData.region || "N/A",
            country: ipData.country_name || "N/A"
        });
      } catch (err) {
        console.error("Error saving click:", err);
      }
    }
  });
  </script>
</body>
