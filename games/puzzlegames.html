<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="../assets/programmerist.png" type="image/x-icon" />
    <title>Jigsaw Puzzle Game 🌶️</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
      }

      #puzzle-container {
        display: grid;
        grid-template-columns: repeat(4, 125px); /* 4 × 125 = 500 */
        grid-template-rows: repeat(4, 125px);
        gap: 2px;
        margin: 20px auto;
        width: 500px;
        height: 500px;
      }

      .puzzle-piece {
        width: 125px;
        height: 125px;
        background-image: url("../assets/anime.jpg"); 
        background-size: 500px 500px; 
        border: 2px solid #ccc;
        cursor: pointer;
      }

      .puzzle-piece.dragging {
        opacity: 0.5;
      }

      #puzzle-container.solved {
        background-image: url("anime.jpg"); 
        background-size: 500px 500px;
        background-position: center;
      }

      #puzzle-container.solved .puzzle-piece {
        opacity: 0;
        pointer-events: none;
      }

      #message {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
        color: green;
      }

      .navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 55px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 15px;
        z-index: 999;
        background: transparent;
        box-sizing: border-box;
      }

      .nav-left {
        font-size: 16px;
        font-weight: bold;
        color: white;
        text-shadow: 0 2px 6px rgba(0,0,0,0.6);
      }

      .nav-links {
        display: flex;
        gap: 12px;
      }

      .nav-links a {
        color: black;
        text-decoration: none;
        font-size: 14px;
        text-shadow: 0 2px 6px rgba(0,0,0,0.6);
      }

      .hamburger {
        display: none;
        font-size: 24px;
        color: white;
        cursor: pointer;
        text-shadow: 0 2px 6px rgba(0,0,0,0.6);
      }

      @media (max-width: 768px) {
        .hamburger {
          display: block;
        }

        .nav-links {
          position: absolute;
          top: 55px;
          right: 0;
          width: 200px;
          flex-direction: column;
          background: rgba(0,0,0,0.85);
          display: none;
          padding: 10px;
          border-radius: 0 0 0 10px;
        }

        .nav-links a {
          padding: 10px 0;
          color: white;
        }

        .nav-links.show {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-left"></div>

      <div class="hamburger" id="hamburger">☰</div>

      <div class="nav-links" id="navLinks">
        <a href="../index.html">Home</a>
        <a href="../invitation/coffee.html">Coffee</a>
        <a href="../invitation/lol.html">Lol</a>
        <a href="../invitation/steam.html">Steam</a>
        <a href="mindgames.html">Memory</a>
        <a href="../collage/index.html">Collage</a>
        <a href="../collage/bloopers.html">Bloopers</a>
      </div>
    </nav>

    <h1>Jigsaw Puzzle Game</h1>
    <div id="puzzle-container"></div>
    <div id="message"></div>

    <script>
      // for hamburger menu button in mobile view
      const hamburger = document.getElementById("hamburger");
      const navLinks = document.getElementById("navLinks");

      hamburger.addEventListener("click", () => {
        navLinks.classList.toggle("show");
      });

      const puzzleContainer = document.getElementById("puzzle-container");
      const message = document.getElementById("message");
      const correctOrder = Array.from({ length: 16 }, (_, i) => i);

      const positions = [];
      for (let row = 0; row < 4; row++) {
        for (let col = 0; col < 4; col++) {
          positions.push(`${-col * 125}px ${-row * 125}px`);
        }
      }

      // Create pieces of each puzzle
      let pieces = positions.map((pos, index) => {
        const div = document.createElement("div");
        div.classList.add("puzzle-piece");
        div.style.backgroundPosition = pos;
        div.setAttribute("draggable", "true");
        div._solutionIndex = index; // hidden in console tab
        return div;
      });

      // Shuffle pieces
      function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }
      pieces = shuffle(pieces);
      pieces.forEach((piece) => puzzleContainer.appendChild(piece));

      // Drag & Drop the puzzle
      let dragged;
      puzzleContainer.addEventListener("dragstart", (e) => {
        if (e.target.classList.contains("puzzle-piece")) {
          dragged = e.target;
          dragged.classList.add("dragging");
        }
      });

      puzzleContainer.addEventListener("dragend", (e) => {
        if (dragged) dragged.classList.remove("dragging");
        dragged = null;
      });

      puzzleContainer.addEventListener("dragover", (e) => e.preventDefault());

      puzzleContainer.addEventListener("drop", (e) => {
        if (
          e.target.classList.contains("puzzle-piece") &&
          e.target !== dragged
        ) {
          const draggedNext = dragged.nextSibling;
          const dropNext = e.target.nextSibling;

          puzzleContainer.insertBefore(dragged, dropNext);
          puzzleContainer.insertBefore(e.target, draggedNext);

          if (checkSolved()) {
            message.textContent = "🎉 Puzzle Solved!";
            puzzleContainer.classList.add("solved");
          }
        }
      });

      function checkSolved() {
        const current = Array.from(puzzleContainer.children);
        return current.every(
          (piece, index) => piece._solutionIndex === correctOrder[index]
        );
      }
    </script>
  </body>
</html>
